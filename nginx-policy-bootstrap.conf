# 临时 HTTP-only 配置，仅用于首次申请 Let's Encrypt 证书
# 证书申请成功后，使用 nginx-policy.conf 替换此文件
server {
    listen 80;
    listen [::]:80;
    server_name dualistic-polarities.com www.dualistic-polarities.com;
    
    root /var/www/dualistic-polarities.com;
    index index.html privacy-policy-cn.html;
    
    # ACME challenge 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/dualistic-polarities.com;
        try_files $uri =404;
    }
    
    # 其他所有请求正常服务
    location / {
        try_files $uri $uri/ =404;
    }
}
